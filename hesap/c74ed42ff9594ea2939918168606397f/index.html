<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="refresh" content="15" />
  <title>Masa 01 Adisyon</title>
  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --line: #e2e8f0;
      --accent: #1d4ed8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #f8fafc 0%, #eef2ff 100%);
      color: var(--text);
      padding: 18px 12px 36px;
    }
    .wrap {
      width: min(760px, 100%);
      margin: 0 auto;
      display: grid;
      gap: 12px;
    }
    .hero, .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 16px;
      box-shadow: 0 12px 28px rgba(15, 23, 42, 0.06);
    }
    .hero {
      color: #fff;
      border: none;
      background: linear-gradient(135deg, #111827 0%, #1d4ed8 100%);
    }
    .eyebrow { font-size: 12px; font-weight: 800; opacity: 0.85; }
    .title { margin-top: 8px; font-size: 28px; font-weight: 900; }
    .sub { margin-top: 4px; font-size: 14px; opacity: 0.92; }
    .summary {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }
    .sum {
      background: var(--card);
      border: 1px solid #dbeafe;
      border-radius: 16px;
      padding: 12px;
    }
    .sum-label { font-size: 12px; color: var(--muted); }
    .sum-value { margin-top: 4px; font-size: 21px; font-weight: 900; }
    .card-title { font-size: 18px; font-weight: 900; margin-bottom: 10px; }
    .row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid #f1f5f9;
    }
    .row:last-child { border-bottom: none; padding-bottom: 0; }
    .name { font-weight: 800; }
    .meta { margin-top: 2px; font-size: 12px; color: var(--muted); }
    .amount { font-weight: 900; white-space: nowrap; }
    .empty { color: var(--muted); }
    .note {
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }
    @media (max-width: 640px) {
      .summary { grid-template-columns: 1fr; }
      .title { font-size: 24px; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <div class="eyebrow">Canlı Adisyon</div>
      <div class="title">Masa 01</div>
      <div class="sub">Dış Bahçe</div>
    </section>
    <section class="summary">
      <div class="sum"><div class="sum-label">Toplam</div><div class="sum-value">700.00 TL</div></div>
      <div class="sum"><div class="sum-label">Ödenen</div><div class="sum-value">0.00 TL</div></div>
      <div class="sum"><div class="sum-label">Kalan</div><div class="sum-value">700.00 TL</div></div>
    </section>
    <section class="card">
      <div class="card-title">Sipariş Kalemleri</div>
      
        <div class="row">
          <div>
            <div class="name">Serpme Kahvaltı</div>
            <div class="meta">1 x 700.00 TL</div>
          </div>
          <div class="amount">700.00 TL</div>
        </div>
    </section>
    <section class="card">
      <div class="card-title">Alınan Ödemeler</div>
      <div class="empty">Henüz ödeme alınmadı.</div>
    </section>
    <div class="note">Bu sayfa hesap kapanana kadar güncel kalır. Kapanınca erişim kaldırılır.</div>
  </main>
</body>
</html>
